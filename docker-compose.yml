version: "3.9"

services:
  backend:
    build:
      context: ./backend
    image: hospital-backend:latest
    container_name: hospital-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-hospital_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-hospital_db}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-change_me_minio_password}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-hospital-data}
      MINIO_AUTO_CREATE_BUCKET: ${MINIO_AUTO_CREATE_BUCKET:-true}
      SPARK_MASTER_URL: spark://spark:7077
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      spark:
        condition: service_started
    networks:
      - hospital_network

  db:
    image: postgres:16.13-alpine
    container_name: hospital-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hospital_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-hospital_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - hospital_network

  minio:
    image: minio/minio:RELEASE.2024-01-11T07-46-16Z
    container_name: hospital-minio
    restart: always
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me_minio_password}
    volumes:
      - minio_data:/data
    networks:
      - hospital_network

  spark:
    image: spark:3.5.8-python3
    container_name: hospital-spark
    restart: always
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      SPARK_MASTER_HOST: spark
      SPARK_MASTER_PORT: "7077"
      SPARK_MASTER_WEBUI_PORT: "8080"
    expose:
      - "7077"
      - "8080"
    networks:
      - hospital_network

  dashboard:
    build: ./dashboard
    container_name: hospital-dashboard
    restart: always
    ports:
      - "8501:8501"
    depends_on:
      - backend
      - minio
    environment:
      BACKEND_URL: http://backend:8000
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-hospital-data}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_CONSOLE_URL: ${MINIO_CONSOLE_URL:-http://localhost:9001}
    networks:
      - hospital_network

networks:
  hospital_network:
    name: hospital_network
    driver: bridge

volumes:
  postgres_data:
  minio_data:
