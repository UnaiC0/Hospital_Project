services:
  backend:
    build:
      context: ./backend
    image: hospital-backend:latest
    container_name: hospital-backend
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: "${POSTGRES_USER:?Set POSTGRES_USER in .env}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
      POSTGRES_DB: "${POSTGRES_DB:?Set POSTGRES_DB in .env}"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: "${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}"
      MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}"
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_BUCKET_NAME: "${MINIO_BUCKET_NAME:?Set MINIO_BUCKET_NAME in .env}"
      MINIO_AUTO_CREATE_BUCKET: ${MINIO_AUTO_CREATE_BUCKET:-true}
      SPARK_MASTER_URL: spark://spark:7077
      MODEL_DIR: /models
      RADIOLOGY_MODEL_FILE: ${RADIOLOGY_MODEL_FILE:-radiology_cnn_resnet18.pt}
      TRIAGE_MODEL_PATH: /models/triage_model.joblib
      TRIAGE_LOW_CONFIDENCE: ${TRIAGE_LOW_CONFIDENCE:-0.55}
    volumes:
      - ./models:/models:ro
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      spark:
        condition: service_started
    networks:
      - hospital_network

  db:
    image: postgres:16.13-alpine
    container_name: hospital-postgres
    restart: always
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: "${POSTGRES_USER:?Set POSTGRES_USER in .env}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
      POSTGRES_DB: "${POSTGRES_DB:?Set POSTGRES_DB in .env}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - hospital_network

  minio:
    image: minio/minio:RELEASE.2024-01-11T07-46-16Z
    container_name: hospital-minio
    restart: always
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - hospital_network

  spark:
    image: spark:3.5.8-python3
    container_name: hospital-spark
    restart: always
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      SPARK_MASTER_HOST: spark
      SPARK_MASTER_PORT: "7077"
      SPARK_MASTER_WEBUI_PORT: "8080"
    expose:
      - "7077"
      - "8080"
    networks:
      - hospital_network

  spark-worker:
    image: spark:3.5.8-python3
    container_name: hospital-spark-worker
    restart: always
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark:7077
    environment:
      SPARK_WORKER_CORES: "2"
      SPARK_WORKER_MEMORY: 1G
      SPARK_WORKER_WEBUI_PORT: "8081"
    depends_on:
      spark:
        condition: service_started
    expose:
      - "8081"
    networks:
      - hospital_network

  pipeline:
    build: ./pipeline
    container_name: hospital-pipeline
    restart: "no"
    profiles:
      - pipeline
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      spark:
        condition: service_started
      spark-worker:
        condition: service_started
      backend:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: "${POSTGRES_USER:?Set POSTGRES_USER in .env}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
      POSTGRES_DB: "${POSTGRES_DB:?Set POSTGRES_DB in .env}"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: "${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}"
      MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}"
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_BUCKET_NAME: "${MINIO_BUCKET_NAME:?Set MINIO_BUCKET_NAME in .env}"
      PIPELINE_INPUT_PATH: /data/incoming/radiology_studies.csv
      PIPELINE_OUTPUT_PATH: /data/processed/radiology_clean
    volumes:
      - ./data:/data
    networks:
      - hospital_network

  model-trainer:
    build: ./ml
    container_name: hospital-model-trainer
    restart: "no"
    profiles:
      - training
    environment:
      DATASET_DIR: /data/Data
      MODEL_DIR: /models
      EPOCHS: ${TRAINING_EPOCHS:-10}
      BATCH_SIZE: ${TRAINING_BATCH_SIZE:-8}
      LEARNING_RATE: ${TRAINING_LEARNING_RATE:-0.0005}
      PRETRAINED: ${TRAINING_PRETRAINED:-true}
      VAL_SPLIT: ${TRAINING_VAL_SPLIT:-0.2}
      SEED: ${TRAINING_SEED:-42}
      NUM_WORKERS: ${TRAINING_NUM_WORKERS:-0}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ./data:/data
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - hospital_network

  triage-trainer:
    build: ./ml
    container_name: hospital-triage-trainer
    restart: "no"
    profiles:
      - triage-training
    command: ["python", "train_triage.py"]
    environment:
      MODEL_DIR: /models
      TRIAGE_SAMPLES: ${TRIAGE_SAMPLES:-8000}
      TRIAGE_N_ESTIMATORS: ${TRIAGE_N_ESTIMATORS:-400}
      TRIAGE_MAX_DEPTH: ${TRIAGE_MAX_DEPTH:-12}
      TRIAGE_NOISE_RATE: ${TRIAGE_NOISE_RATE:-0.06}
      TRIAGE_RANDOM_STATE: ${TRIAGE_RANDOM_STATE:-42}
    volumes:
      - ./models:/models
    networks:
      - hospital_network

  dashboard:
    build: ./dashboard
    container_name: hospital-dashboard
    restart: always
    ports:
      - "127.0.0.1:8501:8501"
    depends_on:
      backend:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      BACKEND_URL: http://backend:8000
      SECRET_KEY: "${SECRET_KEY:?Set SECRET_KEY in .env}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:?Set ADMIN_USERNAME in .env}"
      ADMIN_PASSWORD_HASH: "${ADMIN_PASSWORD_HASH:?Set ADMIN_PASSWORD_HASH in .env}"
      USER_USERNAME: "${USER_USERNAME:?Set USER_USERNAME in .env}"
      USER_PASSWORD_HASH: "${USER_PASSWORD_HASH:?Set USER_PASSWORD_HASH in .env}"
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: "${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}"
      MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}"
      MINIO_BUCKET_NAME: "${MINIO_BUCKET_NAME:?Set MINIO_BUCKET_NAME in .env}"
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_CONSOLE_URL: ${MINIO_CONSOLE_URL:-http://localhost:9001}
    networks:
      - hospital_network

networks:
  hospital_network:
    name: hospital_network
    driver: bridge

volumes:
  postgres_data:
  minio_data:
